name: TypeScript Strictness (Reusable)

on:
  workflow_call:
    inputs:
      file-patterns:
        description: 'TypeScript file patterns (space-separated git pathspecs)'
        required: false
        type: string
        default: '**/*.ts **/*.tsx'
      max-turns:
        description: 'Maximum Claude turns'
        required: false
        type: number
        default: 5
      file-limit:
        description: 'Maximum number of changed files to analyze'
        required: false
        type: number
        default: 30
      strict-mode:
        description: 'Enforce strict type checking'
        required: false
        type: boolean
        default: true
    outputs:
      any-count:
        description: 'Number of any types found'
        value: ${{ jobs.analyze.outputs.any }}
      issues-found:
        description: 'Total type safety issues'
        value: ${{ jobs.analyze.outputs.total }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.scan.outputs.any-count }}
      total: ${{ steps.scan.outputs.total }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed TypeScript files
        id: changed
        run: |
          set -f
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- ${{ inputs.file-patterns }} 2>/dev/null | head -n ${{ inputs.file-limit }} || echo "")
          else
            FILES=$(git diff --name-only HEAD~1 -- ${{ inputs.file-patterns }} 2>/dev/null | head -n ${{ inputs.file-limit }} || echo "")
          fi
          set +f
          FILE_COUNT=$(echo "$FILES" | grep -c '.' || true)
          echo "count=$FILE_COUNT" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Claude TypeScript Analysis
        id: scan
        if: steps.changed.outputs.count != '0'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model haiku --max-turns ${{ inputs.max-turns }}"
          prompt: |
            Review TypeScript changes for type safety issues.
            Strict mode: ${{ inputs.strict-mode }}

            ## Files to analyze
            ${{ steps.changed.outputs.files }}

            ## Critical Issues (Block Merge in Strict Mode)
            - Explicit `any` usage: `const data: any`, `as any`, function params typed as any
            - `@ts-ignore` / `@ts-expect-error` without explanation comment
            - `@ts-nocheck` in files

            ## High Severity Issues
            - Non-null assertions: `user!.name` without guard
            - Unsafe type assertions: `value as SomeType` without runtime validation
            - Implicit `any`: untyped function parameters, callback params

            ## Medium Severity Issues
            - Exported functions without explicit return type
            - `any[]` / `Array<any>` instead of typed arrays
            - Async functions returning implicit `Promise<any>`

            ## Low Severity Issues
            - Missing `as const` where beneficial
            - Overly broad generic types
            - Missing generic constraints

            ## Output Format

            For each issue:
            - **File:Line** - Exact location
            - **Severity** - critical / high / medium / low
            - **Issue** - What's wrong
            - **Current** - The problematic code
            - **Suggested** - Type-safe alternative

            At the end, output machine-readable counts:
            ```
            ANY_COUNT: <number>
            TOTAL_ISSUES: <number>
            ```

            Leave a PR comment with findings grouped by severity.
