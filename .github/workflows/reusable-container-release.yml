name: Container Release (Reusable)

# Release phase of the build-once/promote pattern.
# Runs on tag pushes — attempts to promote the :next-{version} image built
# during the release-please PR. Promotion is a manifest-only retag and
# completes in seconds. Falls back to a full rebuild if the pre-built image
# is not found (e.g. PR build was skipped).
#
# Tag stripping: given tag 'my-app-v1.2.3' and tag-prefix 'my-app-v',
# the version resolved is '1.2.3' and the looked-up pre-release image is
# ghcr.io/.../my-app:next-1.2.3.

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Full image name under ghcr.io (e.g. laurigates/my-app)'
        required: true
        type: string
      tag-prefix:
        description: 'Release tag prefix to strip for version extraction (e.g. "my-app-v")'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile (used only for fallback rebuild)'
        required: false
        type: string
        default: 'Dockerfile'
      context:
        description: 'Build context path (used only for fallback rebuild)'
        required: false
        type: string
        default: '.'
      build-args:
        description: 'Newline-separated Docker build arguments (used only for fallback rebuild)'
        required: false
        type: string
        default: ''
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        type: string
        default: 'linux/amd64'
      cache-scope:
        description: 'GHA cache scope for fallback rebuild'
        required: false
        type: string
        default: 'app'
      scan-severity:
        description: 'Trivy severity levels to report'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      enable-signing:
        description: 'Sign release images with cosign (keyless/Sigstore)'
        required: false
        type: boolean
        default: true
    outputs:
      version:
        description: 'Released version'
        value: ${{ jobs.release.outputs.version }}
      tags:
        description: 'Published image tags'
        value: ${{ jobs.release.outputs.tags }}
      promoted:
        description: 'true if promoted from pre-built image, false if rebuilt'
        value: ${{ jobs.release.outputs.promoted }}
      signed:
        description: 'true if signed with cosign'
        value: ${{ jobs.release.outputs.signed }}

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tags: ${{ steps.meta.outputs.tags }}
      promoted: ${{ steps.pr-image.outputs.exists }}
      signed: ${{ steps.cosign-sign.outputs.signed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log into GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Strip the component prefix from the release-please tag to get the semver
      # version, then construct the :next-{version} pre-release image reference.
      # e.g. my-app-v1.2.3 with prefix my-app-v → version=1.2.3, next_image=…:next-1.2.3
      - name: Extract release version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          PREFIX="${{ inputs.tag-prefix }}"
          VERSION="${TAG#${PREFIX}}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "next_image=ghcr.io/${{ inputs.image-name }}:next-${VERSION}" >> $GITHUB_OUTPUT
          echo "Looking for pre-built PR image: next-${VERSION}"

      - name: Check whether pre-built PR image exists in GHCR
        id: pr-image
        env:
          PR_IMAGE: ${{ steps.version.outputs.next_image }}
        run: |
          if docker manifest inspect "${PR_IMAGE}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "image=${PR_IMAGE}" >> $GITHUB_OUTPUT
            echo "PR image found — will promote instead of rebuilding"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "PR image not found in GHCR — will fall back to full rebuild"
          fi

      - name: Extract Docker metadata (release version tags)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/${{ inputs.image-name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # release-please manifest tag format: {component}-v{version}
            type=match,pattern=.*-v(\d+\.\d+\.\d+),group=1
            type=match,pattern=.*-v(\d+\.\d+),group=1
            type=match,pattern=.*-v(\d+),group=1

      # ---- Fast path: promote the pre-built PR image -------------------------
      # Manifest-only retag: no layer re-upload, completes in seconds.
      - name: Promote PR image to release tags
        if: steps.pr-image.outputs.exists == 'true'
        run: |
          SOURCE="${{ steps.pr-image.outputs.image }}"
          TAG_ARGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_ARGS+=(--tag "$tag")
          done <<< "${{ steps.meta.outputs.tags }}"
          echo "Promoting ${SOURCE} to ${#TAG_ARGS[@]} tags..."
          docker buildx imagetools create "${TAG_ARGS[@]}" "$SOURCE"

      # ---- Slow path: full rebuild (fallback) --------------------------------
      # Reached when the :next-{version} image is not in GHCR.
      - name: Build and push (fallback — no pre-built PR image found)
        id: build-push
        if: steps.pr-image.outputs.exists != 'true'
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            ${{ inputs.build-args }}
          cache-from: type=gha,scope=${{ inputs.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ inputs.cache-scope }}
          provenance: mode=max
          sbom: true

      # ---- Container signing (keyless / Sigstore) -----------------------------
      - name: Install cosign
        if: inputs.enable-signing
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Capture release image digest
        if: inputs.enable-signing
        id: release-digest
        run: |
          FIRST_TAG=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)
          DIGEST=$(docker buildx imagetools inspect "${FIRST_TAG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${{ inputs.image-name }}@${DIGEST}" >> $GITHUB_OUTPUT

      - name: Sign release image with cosign (keyless)
        if: inputs.enable-signing
        id: cosign-sign
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ steps.release-digest.outputs.image }}"
          echo "signed=true" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          image-ref: ghcr.io/${{ inputs.image-name }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ inputs.scan-severity }}

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@9e907b5e64f6b83e7804b09294d44122997950d6 # v4.32.3
        if: always()
        continue-on-error: true  # Code Scanning may not be available on all repos
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Job summary
        if: always()
        run: |
          PROMOTED="${{ steps.pr-image.outputs.exists }}"
          SIGNED="${{ steps.cosign-sign.outputs.signed }}"
          DIGEST="${{ steps.release-digest.outputs.digest }}"
          echo "## Container Release: \`${{ inputs.image-name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: \`${{ steps.meta.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "$PROMOTED" = "true" ]; then
            echo "- **Method**: Promoted from pre-built PR image (fast path)" >> $GITHUB_STEP_SUMMARY
            echo "- **Source**: \`${{ steps.version.outputs.next_image }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Method**: Full rebuild (fallback)" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$SIGNED" = "true" ]; then
            echo "- **Signing**: Signed with cosign (keyless/Sigstore)" >> $GITHUB_STEP_SUMMARY
            echo "- **Digest**: \`${DIGEST}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Rekor**: [transparency log](https://search.sigstore.dev/?hash=${DIGEST})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Verify signature</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo "cosign verify \\" >> $GITHUB_STEP_SUMMARY
            echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com \\" >> $GITHUB_STEP_SUMMARY
            echo "  --certificate-identity-regexp='https://github.com/laurigates/' \\" >> $GITHUB_STEP_SUMMARY
            echo "  ghcr.io/${{ inputs.image-name }}@${DIGEST}" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Tags**:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | while read -r tag; do
            echo "  - \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done
