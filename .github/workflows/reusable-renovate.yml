name: Renovate (Reusable)

on:
  workflow_call:
    inputs:
      config-file:
        description: 'Path to renovate config file'
        required: false
        type: string
        default: 'renovate.json'
      log-level:
        description: 'Renovate log level'
        required: false
        type: string
        default: 'info'
      dry-run:
        description: 'Dry run mode (false, full, lookup)'
        required: false
        type: string
        default: 'false'

concurrency:
  group: renovate-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: renovatebot/github-action@v46.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: ${{ inputs.config-file }}
        env:
          LOG_LEVEL: ${{ inputs.log-level }}
          RENOVATE_DRY_RUN: ${{ inputs.dry-run != 'false' && inputs.dry-run || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_HOST_RULES: '[{"matchHost":"ghcr.io","hostType":"docker","username":"x-access-token","password":"${{ secrets.GITHUB_TOKEN }}"}]'
