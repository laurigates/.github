name: Claude Code (Reusable)

# Enables @claude mentions in issues, PRs, and review comments.
# Claude uses CLAUDE.md files in the calling repo for project context.

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label for the job'
        type: string
        default: 'ubuntu-slim'
      claude_args:
        description: 'Additional arguments for Claude Code (appended after default --max-turns and --system-prompt)'
        type: string
        required: false
        default: ''
      max_turns:
        description: 'Maximum number of agentic turns'
        type: number
        required: false
        default: 30
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    if: |
      github.event.sender.type != 'Bot' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --max-turns ${{ inputs.max_turns }}
            --system-prompt "You have a limited turn budget in CI. For multi-step tasks: commit and push partial progress early — do not wait until everything is done. After each push, update your comment with completed and remaining work. Prioritize working increments over completing everything at once."
            ${{ inputs.claude_args }}
          additional_permissions: |
            actions: read

      - name: Detect failure type
        id: failure-type
        if: steps.claude.outcome == 'failure'
        run: |
          if [[ -f "${{ steps.claude.outputs.execution_file }}" ]] && grep -q "error_max_turns" "${{ steps.claude.outputs.execution_file }}"; then
            echo "type=max-turns" >> "$GITHUB_OUTPUT"
          else
            echo "type=error" >> "$GITHUB_OUTPUT"
          fi

      - name: Post continuation comment on failure
        if: steps.claude.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue?.number || context.payload.issue?.number || context.payload.pull_request?.number;
            if (!issueNumber) return;

            const failureType = '${{ steps.failure-type.outputs.type }}';
            const branchName = '${{ steps.claude.outputs.branch_name }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const lines = [];

            if (failureType === 'max-turns') {
              lines.push(
                '⚠️ **Claude ran out of turns before completing the task.**',
                '',
                'Progress so far is captured in the comment above.',
              );
              if (branchName) {
                lines.push('', `Partial work was pushed to branch \`${branchName}\`.`);
              }
              lines.push(
                '',
                'To continue, reply with:',
                '```',
                'Continue where you left off @claude',
                '```',
              );
            } else {
              lines.push('❌ **Claude encountered an error.**');
            }

            lines.push('', `[View workflow run](${runUrl})`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: lines.join('\n'),
            });

      - name: Fail workflow if Claude failed
        if: steps.claude.outcome == 'failure'
        run: exit 1
